name: Release

# Builds the packaged Windows executable on tagged releases.
#
# packaging/musicvault.spec ships with Phase 16. On ``v*.*.*`` tags this
# workflow runs the full test suite, then PyInstaller onedir build, and
# uploads ``dist/MusicVault/`` as a release artifact.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,build]"

      - name: Run full test suite
        env:
          QT_QPA_PLATFORM: offscreen
          MUSICVAULT_HEADLESS: "1"
        run: pytest

      - name: Build executable
        run: pyinstaller packaging/musicvault.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicVault-${{ github.ref_name }}-windows
          path: dist/MusicVault/
