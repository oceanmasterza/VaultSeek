name: Release

# Builds a self-contained Windows onedir (Python + Qt + pinned vendor
# binaries such as fpcalc) on tagged releases.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,build]"

      - name: Run full test suite
        env:
          QT_QPA_PLATFORM: offscreen
          MUSICVAULT_HEADLESS: "1"
        run: pytest

      - name: Fetch pinned vendor binaries
        run: python packaging/fetch_vendor.py

      - name: Build executable
        run: pyinstaller packaging/musicvault.spec --noconfirm

      - name: Verify bundled fpcalc
        shell: pwsh
        run: |
          if (-not (Test-Path dist/MusicVault/fpcalc.exe)) {
            throw "fpcalc.exe missing from onedir bundle"
          }
          Get-Item dist/MusicVault/fpcalc.exe | Format-List Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicVault-${{ github.ref_name }}-windows
          path: dist/MusicVault/
